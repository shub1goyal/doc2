name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Inject API Keys
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
        run: |
          python -c "
          import os
          keys = os.environ.get('GEMINI_API_KEYS', '')
          if not keys:
              print('Warning: GEMINI_API_KEYS secret is empty or not set.')
          with open('index.js', 'r', encoding='utf-8') as f:
              content = f.read()
          content = content.replace('/* GEMINI_API_KEYS_INJECTED */', keys)
          with open('index.js', 'w', encoding='utf-8') as f:
              f.write(content)
          print('API keys successfully injected at build time!')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
